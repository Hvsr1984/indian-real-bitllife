<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitLife India - Next-Gen Indian Life Simulator</title>
    <meta name="description" content="Experience an immersive next-generation Indian life simulation game. Clear competitive exams like JEE/NEET/UPSC, build startup business empires, pursue Cricket or Bollywood careers, and establish your legacy dynasty." />
    <meta name="theme-color" content="#050508" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Canvas Confetti script from CDN as fallback for canvas-confetti npm package -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Yandex Games SDK -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <script>
      if (typeof YaGames !== 'undefined') {
        YaGames
          .init()
          .then(ysdk => {
              console.log('Yandex SDK initialized');
              window.ysdk = ysdk;
          })
          .catch(err => {
              console.error('Yandex SDK initialization error:', err);
          });
      } else {
        console.log('Yandex SDK not found (running outside Yandex Games environment)');
      }
    </script>
  </body>
</html>
